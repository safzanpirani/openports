<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>openports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // pre-paint theme to avoid a flash of light on dark mode
      (function () {
        try {
          var saved = localStorage.getItem('openports.theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var theme = saved || (prefersDark ? 'dark' : 'light')
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
